        <path d="M0,0 L10,5 L0,10 z" fill="#9ab0d4"/>
      </marker>
    </defs>
    <line x1="262" y1="180" x2="338" y2="180"/>
    <line x1="522" y1="180" x2="598" y2="180"/>
    <line x1="782" y1="180" x2="858" y2="180"/>
  </g>
