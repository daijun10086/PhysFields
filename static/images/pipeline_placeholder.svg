<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360">
  <rect width="1200" height="360" fill="#f5f7fb"/>
  <g fill="#dbe3f1" stroke="#9ab0d4" stroke-width="1.5">
    <rect x="80"   y="130" width="180" height="100" rx="10"/>
    <rect x="340"  y="130" width="180" height="100" rx="10"/>
    <rect x="600"  y="130" width="180" height="100" rx="10"/>
    <rect x="860"  y="130" width="180" height="100" rx="10"/>
  </g>
  <g fill="#6b7a96" font-family="Google Sans, sans-serif" text-anchor="middle">
